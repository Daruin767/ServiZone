name: servizone_app
description: Aplicación para conectar usuarios con proveedores de servicios profesionales y domésticos
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # ------------------- GESTIÓN DE ESTADO -------------------
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  
  # ------------------- INYECCIÓN DE DEPENDENCIAS -------------------
  get_it: ^7.7.0
  
  # ------------------- NAVEGACIÓN -------------------
  go_router: ^14.2.7
  
  # ------------------- PETICIONES HTTP -------------------
  dio: ^5.5.0+1
  
  # ------------------- ALMACENAMIENTO LOCAL -------------------
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2
  
  # ------------------- ARCHIVOS (CERTIFICADOS) -------------------
  file_picker: ^8.0.6
  image_picker: ^1.1.2
  path_provider: ^2.1.3
  path: ^1.9.0
  
  # ------------------- GEOLOCALIZACIÓN -------------------
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  google_maps_flutter: ^2.7.0
  
  # ------------------- CALENDARIO -------------------
  table_calendar: ^3.1.2
  
  # ------------------- FECHAS -------------------
  intl: ^0.20.2
  
  # ------------------- VALIDACIÓN -------------------
  form_validator: ^2.1.1
  
  # ------------------- IMÁGENES -------------------
  cached_network_image: ^3.3.1
  
  # ------------------- ÍCONOS -------------------
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.7.0
  url_launcher: ^6.3.1
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/