name: servizone_app
description: Aplicación para conectar usuarios con proveedores de servicios profesionales y domésticos
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # ------------------- INYECCIÓN DE DEPENDENCIAS -------------------
  get_it: ^7.7.0
  
  # ------------------- ALMACENAMIENTO LOCAL -------------------
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2
  
  # ------------------- ARCHIVOS (CERTIFICADOS) -------------------
  file_picker: ^8.0.6
  image_picker: ^1.1.2
  path_provider: ^2.1.3
  path: ^1.9.0
  
  # ------------------- GEOLOCALIZACIÓN -------------------
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  
  # ------------------- FECHAS -------------------
  intl: ^0.20.2
  
  # ------------------- ÍCONOS -------------------
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.1
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true